services:
  - type: web
    name: neurovision-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./neurovision.db
